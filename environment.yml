# Helix Factor Strategy - Conda environment
name: helix-factor-strategy
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - numpy>=1.24.0
  - pandas>=2.0.0
  - scikit-learn>=1.3.0
  - scipy>=1.11.0
  - matplotlib>=3.7.0
  - pip
  - pip:
    - python-dotenv>=1.0.0
    - yfinance>=0.2.0
    - fredapi>=0.5.0
    - wandb>=0.16.0
    - optuna>=3.0.0
